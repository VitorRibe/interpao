services:
  # --- INFRASTRUCTURE ---
  redis:
    image: redis:7-alpine
    container_name: interpao-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - interpao-network

  # --- BACKEND ---
  api:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: interpao-api
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SUPABASE_URL=http://rest:3000
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SECRET_KEY=${SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - interpao-network

  worker:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: interpao-worker
    command: ["uv", "run", "celery", "-A", "app.core.celery_app", "worker", "--loglevel=info"]
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - interpao-network

  beat:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: interpao-beat
    command: ["uv", "run", "celery", "-A", "app.core.celery_app", "beat", "--loglevel=info"]
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - REDIS_HOST=redis
    depends_on:
      - redis
    networks:
      - interpao-network

  # --- FRONTEND ---
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: interpao-frontend
    ports:
      - "3000:80"
    networks:
      - interpao-network

networks:
  interpao-network:
    external: true
    name: interpao-network
